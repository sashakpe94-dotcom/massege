<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESAGE Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .container {
            width: 100%; max-width: 1000px; height: 95vh; background: white;
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex; overflow: hidden;
        }
        .sidebar { width: 300px; background: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #34495e; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #e74c3c; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .users-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item {
            padding: 15px; margin: 5px 0; background: #34495e;
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; position: relative;
        }
        .user-item:hover { background: #4a6785; }
        .user-item.active { background: #3498db; }
        .user-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0;
        }
        .delete-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: #e74c3c; border: none; color: white;
            width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; font-size: 16px; display: none; z-index: 10;
        }
        .user-item:hover .delete-btn { display: block; }
        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100%; }
        .chat-header {
            padding: 20px; background: #ecf0f1; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        .call-btn {
            background: #2ecc71; border: none; color: white;
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px;
        }
        .end-call-btn {
            background: #e74c3c; border: none; color: white;
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; display: none;
        }
        .call-indicator {
            background: #2ecc71; color: white; padding: 6px 12px;
            border-radius: 20px; font-size: 12px; display: none;
        }
        .messages-area {
            flex: 1; padding: 20px; overflow-y: auto; background: #f8f9fa;
        }
        .message { margin: 8px 0; display: flex; flex-direction: column; }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .message-bubble {
            max-width: 70%; padding: 10px 15px; border-radius: 15px;
            word-wrap: break-word; font-size: 14px;
        }
        .sent .message-bubble { background: #3498db; color: white; }
        .received .message-bubble { background: white; border: 1px solid #ddd; }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        .input-area {
            padding: 15px; background: white; border-top: 1px solid #ddd;
            display: flex; gap: 10px; flex-shrink: 0;
        }
        .input-area input {
            flex: 1; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 25px; outline: none; font-size: 14px;
        }
        .send-btn {
            background: #3498db; border: none; color: white;
            padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px;
        }
        .no-chat {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: #aaa; font-size: 18px; flex-direction: column;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px;
        }
        .modal-content h2 { margin-bottom: 20px; text-align: center; }
        .modal-content input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #e0e0e0; border-radius: 10px; outline: none;
        }
        .modal-content button {
            width: 100%; padding: 12px; background: #3498db; color: white;
            border: none; border-radius: 10px; cursor: pointer; margin-top: 10px;
        }
        .toggle-auth { text-align: center; margin-top: 15px; color: #7f8c8d; cursor: pointer; }
        .notification {
            position: fixed; top: 20px; right: 20px; padding: 12px 20px;
            border-radius: 10px; color: white; z-index: 2000; display: none;
        }
        .notification.success { background: #2ecc71; }
        .notification.error { background: #e74c3c; }
        .call-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 3000;
        }
        .call-overlay.show { display: flex; }
        .call-box {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
        }
        .call-box button {
            padding: 12px 30px; margin: 5px; border: none;
            border-radius: 10px; cursor: pointer; font-size: 16px;
        }
        .btn-accept { background: #2ecc71; color: white; }
        .btn-reject { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="container" id="app" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>MESAGE</h2>
                <button class="logout-btn" onclick="window.logout()">Выйти</button>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
        <div class="main-chat">
            <div class="no-chat" id="noChat">💬 Выберите пользователя</div>
            <div id="chatArea" style="display:none;flex:1;flex-direction:column;">
                <div class="chat-header">
                    <h3 id="chatName"></h3>
                    <div>
                        <span class="call-indicator" id="callInd">📞 Активен</span>
                        <button class="call-btn" id="callBtn" onclick="window.startCall()">📞 Позвонить</button>
                        <button class="end-call-btn" id="endCallBtn" onclick="window.endCall()">❌ Завершить</button>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button class="send-btn" onclick="window.sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal show" id="authModal">
        <div class="modal-content">
            <h2 id="authTitle">Вход в MESAGE</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <input type="text" id="usernameInput" placeholder="Имя" style="display:none;">
            <button onclick="window.authenticate()" id="authBtn">Войти</button>
            <div class="toggle-auth" onclick="window.toggleAuth()"><span id="toggleText">Регистрация</span></div>
        </div>
    </div>

    <div class="call-overlay" id="callOverlay">
        <div class="call-box">
            <h2>📞 Входящий звонок</h2>
            <p id="callerName" style="font-size:18px;margin:15px 0;"></p>
            <button class="btn-accept" onclick="window.acceptCall()">✅ Ответить</button>
            <button class="btn-reject" onclick="window.rejectCall()">❌ Отклонить</button>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, doc, setDoc, getDoc, deleteDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCC3q9EwYn4M4_v_7qeAg7NKvSZ1T7WfE8",
            authDomain: "mesage-96b2a.firebaseapp.com",
            projectId: "mesage-96b2a",
            storageBucket: "mesage-96b2a.firebasestorage.app",
            messagingSenderId: "530920991593",
            appId: "1:530920991593:web:44d8cf08c57848d6152bf8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const ADMIN = "Sashakrut53@yandex.ru";

        let currentUser = null, selectedUser = null, peer = null;
        let currentCall = null, localStream = null, unsub = null;
        let isAdmin = false, loginMode = true, incomingCall = null;

        function notify(msg, type) {
            const el = document.getElementById('notification');
            el.textContent = msg; el.className = 'notification ' + type;
            el.style.display = 'block';
            clearTimeout(el._t); el._t = setTimeout(() => el.style.display = 'none', 3000);
        }

        window.toggleAuth = () => {
            loginMode = !loginMode;
            document.getElementById('authTitle').textContent = loginMode ? 'Вход' : 'Регистрация';
            document.getElementById('usernameInput').style.display = loginMode ? 'none' : 'block';
            document.getElementById('authBtn').textContent = loginMode ? 'Войти' : 'Зарегистр.';
            document.getElementById('toggleText').textContent = loginMode ? 'Регистрация' : 'Вход';
        };

        window.authenticate = async () => {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();
            const name = document.getElementById('usernameInput').value.trim();
            if (!email || !pass) return notify('Заполните поля', 'error');
            try {
                if (loginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    if (!name) return notify('Введите имя', 'error');
                    const uc = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'users', uc.user.uid), {
                        uid: uc.user.uid, email, username: name, online: true, lastSeen: serverTimestamp()
                    });
                }
                notify('Успешно!', 'success');
            } catch(e) {
                let m = 'Ошибка';
                if (e.code === 'auth/email-already-in-use') m = 'Email занят';
                else if (e.code === 'auth/invalid-credential') m = 'Неверно';
                else if (e.code === 'auth/weak-password') m = 'Пароль: 6+ символов';
                notify(m, 'error');
            }
        };

        onAuthStateChanged(auth, async user => {
            if (user) {
                currentUser = user; isAdmin = user.email === ADMIN;
                document.getElementById('authModal').classList.remove('show');
                document.getElementById('app').style.display = 'flex';
                const ref = doc(db, 'users', user.uid);
                const snap = await getDoc(ref);
                if (!snap.exists()) {
                    await setDoc(ref, { uid: user.uid, email: user.email, username: user.email.split('@')[0], online: true, lastSeen: serverTimestamp() });
                } else {
                    await setDoc(ref, { online: true, lastSeen: serverTimestamp() }, { merge: true });
                }
                initPeer(user.uid);
                loadUsers();
            } else {
                if (peer) peer.destroy();
                document.getElementById('authModal').classList.add('show');
                document.getElementById('app').style.display = 'none';
            }
        });

        function initPeer(uid) {
            if (peer) peer.destroy();
            const id = uid.replace(/[^a-zA-Z0-9]/g, '');
            peer = new Peer(id, {
                host: 'peerjs.herokuapp.com', port: 443, secure: true, path: '/',
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            
            peer.on('open', pid => console.log('Peer ready:', pid));
            
            peer.on('call', call => {
                incomingCall = call;
                document.getElementById('callOverlay').classList.add('show');
                getDoc(doc(db, 'users', call.peer)).then(d => {
                    document.getElementById('callerName').textContent = d.exists() ? d.data().username : 'Пользователь';
                });
            });
            
            peer.on('error', e => {
                if (e.type === 'peer-unavailable') notify('Пользователь недоступен', 'error');
            });
        }

        window.acceptCall = async () => {
            if (!incomingCall) return;
            const call = incomingCall; incomingCall = null;
            document.getElementById('callOverlay').classList.remove('show');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                call.answer(localStream);
                handleCall(call);
            } catch(e) { call.close(); notify('Ошибка микрофона', 'error'); }
        };

        window.rejectCall = () => {
            if (incomingCall) { incomingCall.close(); incomingCall = null; }
            document.getElementById('callOverlay').classList.remove('show');
        };

        function handleCall(call) {
            currentCall = call;
            document.getElementById('callBtn').style.display = 'none';
            document.getElementById('endCallBtn').style.display = 'inline-block';
            document.getElementById('callInd').style.display = 'inline-block';
            
            call.on('stream', stream => {
                const audio = new Audio(); audio.srcObject = stream;
                audio.play().catch(() => document.addEventListener('click', () => audio.play(), { once: true }));
                notify('Разговор!', 'success');
            });
            
            call.on('close', () => { endCallQuiet(); notify('Звонок завершён', 'info'); });
            call.on('error', () => { endCallQuiet(); });
        }

        window.endCall = () => { if (currentCall) currentCall.close(); endCallQuiet(); notify('Завершено', 'info'); };

        function endCallQuiet() {
            if (currentCall) { try { currentCall.close() } catch(e) {}; currentCall = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            document.getElementById('callBtn').style.display = 'inline-block';
            document.getElementById('endCallBtn').style.display = 'none';
            document.getElementById('callInd').style.display = 'none';
        }

        window.startCall = async () => {
            if (!selectedUser) return notify('Выберите пользователя', 'error');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const call = peer.call(selectedUser.id.replace(/[^a-zA-Z0-9]/g, ''), localStream);
                if (call) handleCall(call); else { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            } catch(e) { notify('Ошибка микрофона', 'error'); }
        };

        function loadUsers() {
            onSnapshot(collection(db, 'users'), snap => {
                const list = document.getElementById('usersList');
                list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    if (data.uid !== currentUser.uid) {
                        const div = document.createElement('div');
                        div.className = 'user-item';
                        div.setAttribute('data-uid', d.id);
                        div.innerHTML = `<div class="user-avatar">${(data.username||'?')[0].toUpperCase()}</div><div style="flex:1"><div>${data.username}</div><div style="font-size:12px;color:${data.online?'#2ecc71':'#95a5a6'}">${data.online?'Онлайн':'Оффлайн'}</div></div>`;
                        if (isAdmin) {
                            const btn = document.createElement('button');
                            btn.className = 'delete-btn'; btn.textContent = '✕';
                            btn.onclick = e => { e.stopPropagation(); delUser(d.id, data.username); };
                            div.appendChild(btn);
                        }
                        div.onclick = () => selectUser(d.id, data);
                        list.appendChild(div);
                    }
                });
            });
        }

        async function delUser(uid, name) {
            if (!confirm(`Удалить ${name}?`)) return;
            await deleteDoc(doc(db, 'users', uid));
            notify(`${name} удалён`, 'success');
        }

        function selectUser(uid, data) {
            selectedUser = { id: uid, ...data };
            document.getElementById('noChat').style.display = 'none';
            document.getElementById('chatArea').style.display = 'flex';
            document.getElementById('chatName').textContent = data.username;
            document.querySelectorAll('.user-item').forEach(e => e.classList.remove('active'));
            document.querySelector(`[data-uid="${uid}"]`)?.classList.add('active');
            if (unsub) unsub();
            
            const chatId = [currentUser.uid, uid].sort().join('_');
            unsub = onSnapshot(query(collection(db, 'messages'), where('chatId', '==', chatId), orderBy('timestamp', 'asc')), snap => {
                const area = document.getElementById('messagesArea');
                area.innerHTML = snap.empty ? '<div style="text-align:center;color:#aaa;margin-top:50px;">Нет сообщений</div>' : '';
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = 'message ' + (m.senderId === currentUser.uid ? 'sent' : 'received');
                    div.innerHTML = `<div class="message-bubble">${m.text}</div><div class="message-time">${m.timestamp?new Date(m.timestamp.toDate()).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}):''} ${m.senderId===currentUser.uid?'✓':''}</div>`;
                    area.appendChild(div);
                });
                area.scrollTop = area.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const text = document.getElementById('messageInput').value.trim();
            if (!text || !selectedUser) return;
            await addDoc(collection(db, 'messages'), {
                chatId: [currentUser.uid, selectedUser.id].sort().join('_'),
                senderId: currentUser.uid, receiverId: selectedUser.id, text, timestamp: serverTimestamp()
            });
            document.getElementById('messageInput').value = '';
        };

        window.logout = async () => {
            await setDoc(doc(db, 'users', currentUser.uid), { online: false, lastSeen: serverTimestamp() }, { merge: true });
            if (unsub) unsub();
            endCallQuiet();
            if (peer) peer.destroy();
            await signOut(auth);
        };
    </script>
</body>
</html>
